name: EC2 Control with Shell

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Choose action"
        required: true
        type: choice
        options:
          - create
          - stop
          - terminate

      instance_count:
        description: "Number of EC2 instances (for create)"
        required: false

      instance_id:
        description: "Instance ID (for stop or terminate)"
        required: false

jobs:
  ec2-control:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: EC2 Control Script
        run: |
          ACTION="${{ github.event.inputs.action }}"
          if [ "$ACTION" = "create" ]; then
            COUNT="${{ github.event.inputs.instance_count }}"
            echo "Creating $COUNT EC2 instance(s)..."
            for i in $(seq 1 $COUNT); do
              aws ec2 run-instances \
                --image-id ami-03f4878755434977f \
                --count 1 \
                --instance-type t2.micro \
                --tag-specifications "ResourceType=instance,Tags=[{Key=Name,Value=github-actions-ec2-$i}]"
            done
          elif [ "$ACTION" = "stop" ]; then
            INSTANCE_ID="${{ github.event.inputs.instance_id }}"
            echo "Stopping EC2 instance $INSTANCE_ID..."
            aws ec2 stop-instances --instance-ids "$INSTANCE_ID"
          elif [ "$ACTION" = "terminate" ]; then
            INSTANCE_ID="${{ github.event.inputs.instance_id }}"
            echo "Terminating EC2 instance $INSTANCE_ID..."
            aws ec2 terminate-instances --instance-ids "$INSTANCE_ID"
          else
            echo "Invalid action!"
            exit 1
          fi